<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activate Pro</title>
    <link rel="stylesheet" href="../styles/style.css">
    <style>
        .checkout-box { width: 450px; background: rgba(0, 10, 20, 0.95); border: 2px solid #004080; border-radius: 15px; padding: 40px; text-align: center; }
        .status-text { color: #888; font-size: 0.9rem; margin: 20px 0; }
        .price-tag { color: #00d9ff; font-size: 2rem; font-family: 'Orbitron', sans-serif; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <div class="fire-bg-layer"><canvas id="fireCanvas"></canvas></div>
        <div class="content-ui">
            <div class="checkout-box">
                <h2 style="font-family:'FlameInferno'; color:#ff3300; font-size:3rem; margin:0;">PRO UPGRADE</h2>
                <div class="price-tag">$7.00</div>
                <p class="status-text">Your system will be upgraded to GPU Acceleration Level 5 upon successful store authorization.</p>
                
                <div style="display:flex; flex-direction:column; gap:15px;">
                    <button class="menu-btn active-glow" onclick="startPurchase('pro')">AUTHORIZE PAYMENT</button>
                    <button class="menu-btn" style="border-color:#300;" onclick="location.href='../upgrade_plan.html'">CANCEL</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; justify-content:center; align-items:center;">
        <div style="width:50px; height:50px; border:3px solid #111; border-top:3px solid #ff3300; border-radius:50%; animation:spin 1s linear infinite;"></div>
        <h3 style="color:#ff3300; margin-top:20px; font-family:sans-serif; letter-spacing:2px;">SECURE STORE HANDSHAKE...</h3>
    </div>

    <script src="../../assets/js/payments.js"></script>
    <script src="../styles/flame_atmosphere.js"></script>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</body>
</html>
