<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Activation</title>
    <link rel="stylesheet" href="../styles/style.css">
    <style>
        .checkout-box { width: 450px; background: rgba(0, 5, 10, 0.98); border: 2px solid #ff3300; border-radius: 15px; padding: 40px; text-align: center; box-shadow: 0 0 50px rgba(255, 51, 0, 0.2); }
        .price-tag { color: #ffffff; font-size: 2.5rem; font-family: 'Orbitron', sans-serif; margin: 10px 0; text-shadow: 0 0 10px #00d9ff; }
    </style>
</head>
<body>
    <div id="app-wrapper">
        <div class="fire-bg-layer"><canvas id="fireCanvas"></canvas></div>
        <div class="content-ui">
            <div class="checkout-box">
                <h2 style="font-family:'FlameInferno'; color:#ff3300; font-size:3rem; margin:0;">ENTERPRISE</h2>
                <div class="price-tag">$15.00</div>
                <p style="color:#00d9ff; font-weight:bold; letter-spacing:1px;">MAXIMUM ENGINE POWER</p>
                
                <div style="display:flex; flex-direction:column; gap:15px; margin-top:30px;">
                    <button class="menu-btn active-glow" onclick="startPurchase('enterprise')">UNLOCK FULL SYSTEM</button>
                    <button class="menu-btn" style="border-color:#222; color:gray;" onclick="location.href="upgrade_plan.html">BACK</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; justify-content:center; align-items:center;">
        <div style="width:60px; height:60px; border:4px solid #111; border-top:4px solid #00d9ff; border-radius:50%; animation:spin 0.8s linear infinite;"></div>
        <h3 style="color:#00d9ff; margin-top:20px; font-family:sans-serif; letter-spacing:3px;">INITIALIZING ENTERPRISE LICENSE...</h3>
    </div>

    <script src="../../assets/js/payments.js"></script>
    <script src="../styles/flame_atmosphere.js"></script>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
</body>
</html>
